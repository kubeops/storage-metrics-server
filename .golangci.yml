version: "2"
linters:
  default: standard
  enable:
    - bodyclose
    - prealloc
    - unparam
  settings:
    staticcheck:
      checks:
        - all
        # Retain embedded fields in selectors for readability (upstream style).
        - "-QF1008"
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # Relax error/param checks in test files so the suite stays close to the
      # upstream custom-metrics-apiserver tests.
      - path: _test\.go
        linters:
          - errcheck
          - unparam
    paths:
      - vendor
      - pkg/generated
      - third_party$
      - builtin$
      - examples$

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - kubeops.dev/storage-metrics-server
  exclusions:
    paths:
      - vendor
      - pkg/generated
      - third_party$
      - builtin$
      - examples$

issues:
  max-same-issues: 100

run:
  timeout: 10m
