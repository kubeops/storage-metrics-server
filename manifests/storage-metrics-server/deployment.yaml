apiVersion: apps/v1
kind: Deployment
metadata:
  name: storage-metrics-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: storage-metrics-server
      app.kubernetes.io/component: apiserver
  template:
    metadata:
      labels:
        app.kubernetes.io/name: storage-metrics-server
        app.kubernetes.io/component: apiserver
    spec:
      serviceAccountName: storage-metrics-server
      priorityClassName: system-cluster-critical
      containers:
      - name: storage-metrics-server
        image: storage-metrics-server
        imagePullPolicy: IfNotPresent
        args:
        - --secure-port=6443
        - --cert-dir=/tmp/serving-cert
        - --kubelet-insecure-tls
        - --kubelet-use-node-status-port
        - --kubelet-preferred-address-types=InternalIP,Hostname,InternalDNS,ExternalDNS,ExternalIP
        - --metric-resolution=60s
        - --kubelet-request-timeout=10s
        - --v=2
        ports:
        - containerPort: 6443
          name: https
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /readyz
            port: https
            scheme: HTTPS
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /livez
            port: https
            scheme: HTTPS
          periodSeconds: 10
          failureThreshold: 3
        resources:
          requests:
            cpu: 100m
            memory: 200Mi
          limits:
            cpu: 500m
            memory: 500Mi
        securityContext:
          runAsNonRoot: true
          runAsUser: 65534
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
          seccompProfile:
            type: RuntimeDefault
        volumeMounts:
        - mountPath: /tmp
          name: tmp
        - mountPath: /tmp/serving-cert
          name: serving-cert
      volumes:
      - name: tmp
        emptyDir: {}
      - name: serving-cert
        emptyDir: {}
