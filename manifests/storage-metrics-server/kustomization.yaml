apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: storage-metrics

commonLabels:
  app.kubernetes.io/name: storage-metrics-server
  app.kubernetes.io/component: apiserver

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - clusterrole.yaml
  - clusterrolebinding.yaml
  - service.yaml
  - apiservice.yaml
  - deployment.yaml

images:
  - name: storage-metrics-server
    newName: ghcr.io/kubeops/storage-metrics-server
    newTag: latest
